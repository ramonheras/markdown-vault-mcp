name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run ruff check
        run: uv run ruff check src/ tests/

      - name: Run ruff format check
        run: uv run ruff format --check src/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run mypy
        run: uv run mypy src/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental || false }}
    permissions:
      contents: read
      statuses: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.11"
            experimental: false
          - python-version: "3.12"
            experimental: false
          - python-version: "3.13"
            experimental: false
          - python-version: "3.14"
            experimental: true
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          override_pr: ${{ github.event.pull_request.number }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Fetch base branch for diff-cover
        if: matrix.python-version == '3.13' && github.event_name == 'pull_request'
        run: git fetch origin ${{ github.base_ref }} --depth=50

      - name: Check patch coverage
        id: diffcover
        if: matrix.python-version == '3.13' && github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Check if PR has Python source changes
          HAS_PY=$(git diff --name-only "origin/${BASE_REF}...HEAD" | grep -c '\.py$' || true)
          if [ "$HAS_PY" -eq 0 ]; then
            echo "state=success" >> "$GITHUB_OUTPUT"
            echo "description=Coverage not affected" >> "$GITHUB_OUTPUT"
            echo "No Python source changes — skipping diff-cover"
          else
            OUTPUT=$(uv run diff-cover coverage.xml --compare-branch="origin/${BASE_REF}" --fail-under=80 2>&1) && RC=0 || RC=$?
            echo "$OUTPUT"
            TOTAL=$(echo "$OUTPUT" | grep -oP 'Total:\s+\K[\d.]+' || true)
            if [ -z "$TOTAL" ]; then
              echo "WARNING: could not parse total from diff-cover output"
              TOTAL="unknown"
            fi
            if [ "$RC" -eq 0 ]; then
              echo "state=success" >> "$GITHUB_OUTPUT"
              echo "description=Patch coverage: ${TOTAL}%" >> "$GITHUB_OUTPUT"
            else
              echo "state=failure" >> "$GITHUB_OUTPUT"
              echo "description=Patch coverage: ${TOTAL}% (minimum 80%)" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Post codecov/patch status
        if: matrix.python-version == '3.13' && github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const state = '${{ steps.diffcover.outputs.state }}' || 'error';
            const description = '${{ steps.diffcover.outputs.description }}' || 'diff-cover step did not run';
            const headSha = context.payload.pull_request.head.sha;
            core.info(`Posting codecov/patch: ${state} — ${description} to ${headSha}`);
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: headSha,
              state: state,
              context: 'codecov/patch',
              description: description,
              target_url: 'https://app.codecov.io/gh/pvliesdonk/markdown-vault-mcp',
            });

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Export dependency list (excluding local project)
        run: uv export --all-extras --frozen --no-emit-project --no-hashes -o ${{ runner.temp }}/requirements.txt

      - name: Run pip-audit
        run: uvx pip-audit --strict --progress-spinner off --ignore-vuln CVE-2026-25990 -r ${{ runner.temp }}/requirements.txt

  secrets:
    name: Secret Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
