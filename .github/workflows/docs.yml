name: Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # On release events the triggering tag may move after the workflow is
          # queued (the release workflow pushes a version-bump commit and
          # updates the tag). Checkout main explicitly on releases to avoid the
          # "ref does not point to the expected commit" error from
          # actions/checkout's SHA-verification.
          ref: ${{ github.event_name == 'release' && 'main' || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra docs --frozen

      - name: Build documentation
        run: uv run mkdocs build --strict

      - name: Upload artifact
        if: github.event_name == 'release'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/

  deploy:
    if: github.event_name == 'release'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
