repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        language: system
        entry: uv run ruff check --fix
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: ruff format
        language: system
        entry: uv run ruff format
        types: [python]
        pass_filenames: true

      - id: mypy
        name: mypy
        language: system
        entry: uv run mypy
        files: ^src/
        pass_filenames: false
        args: [src/]

      - id: vendor-spa-check
        name: vendored SPA HTML up-to-date
        language: system
        entry: uv run python scripts/vendor_spa.py --check
        files: ^src/markdown_vault_mcp/static/app\.src\.html$
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
