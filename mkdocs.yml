site_name: markdown-vault-mcp
site_url: https://pvliesdonk.github.io/markdown-vault-mcp/
site_description: Generic markdown collection MCP server with FTS5 + semantic search
repo_url: https://github.com/pvliesdonk/markdown-vault-mcp
repo_name: pvliesdonk/markdown-vault-mcp
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

exclude_docs: |
  design.md
  deployment.md
  superpowers/**

hooks:
  - docs/hooks.py

plugins:
  - search
  # Generates llms.txt + llms-full.txt for the README badge.
  # Sections mirror `nav:` below — keep them aligned when customising
  # (both blocks are sentinel-protected so customise both as a unit).
  - llmstxt:
      full_output: llms-full.txt
      markdown_description: >
        markdown-vault-mcp is a generic markdown collection MCP server with
        FTS5 full-text search, semantic search via embeddings, frontmatter-aware
        indexing, and incremental reindexing. It exposes 28 LLM-visible tools
        (plus 6 app-only tools), 9 resources, and 6 prompts over the Model
        Context Protocol.
      sections:
        # PROJECT-LLMSTXT-SECTIONS-START — keep aligned with `nav:` below;
        # kept across copier update.
        Getting Started:
          - index.md: Overview — features, quick start, and project links
          - installation.md: Installation from PyPI, uv, source, or Docker
          - configuration.md: All environment variables with types and defaults
        Guides:
          - guides/index.md: Guide overview — which guide to read
          - guides/git-integration.md: Git modes — managed, unmanaged (commit-only), and no-git
          - guides/claude-desktop.md: Claude Desktop setup (read-only, git write, semantic search)
          - guides/docker.md: Docker deployment (basic, git write, bearer token, OIDC)
          - guides/embeddings.md: Embedding providers (Ollama, sentence-transformers, OpenAI)
          - guides/authentication.md: Authentication modes — bearer token, OIDC, and troubleshooting
          - guides/oidc-providers.md: OIDC provider setup (Authelia, Keycloak, Google, GitHub via broker)
          - guides/obsidian-everywhere.md: Reference architecture for desktop + mobile + Claude on one vault
          - guides/research-workflows.md: Research workflows (seed → ground → absorb → interconnect → produce, with optional scholar-mcp integration)
          - guides/zettelkasten.md: Zettelkasten workflow (fleeting → literature → permanent notes, MOCs, graph navigation)
          - guides/para.md: PARA workflow (Projects/Areas/Resources/Archive with triage, kickoff, and weekly review prompts)
          - guides/mcp-apps.md: MCP Apps — Context Card, Graph Explorer, Vault Browser, and Note Preview views
          - guides/claude-code-plugin.md: Claude Code plugin — install via /plugin marketplace
          - guides/file-exchange.md: MCP File Exchange — out-of-band file transfer (status, fetch/write/create_download_link today, #431 migration)
        MCP Interface:
          - tools/index.md: MCP tools with parameters and examples (search, read, write, link graph, MCP Apps)
          - resources.md: MCP resources with URI patterns (config, stats, tags, folders, toc, similar, recent, ui)
          - prompts.md: All 6 MCP prompts with workflow descriptions
        Deployment:
          - deployment/index.md: Deployment overview
          - deployment/docker.md: Docker Compose, Traefik, volumes, UID/GID
          - deployment/systemd.md: systemd service — package install, manual install, security hardening
          - deployment/claude-desktop.md: Claude Desktop configuration reference
          - deployment/oidc.md: OIDC authentication setup with Authelia
        Python API:
          - api/collection.md: Collection class API reference
          - api/git.md: GitWriteStrategy API reference
          - api/config.md: Configuration loading API reference
          - api/providers.md: Embedding provider API reference
          - api/types.md: All data types returned by the Collection API
          - api/exceptions.md: All exceptions raised by the library
        # PROJECT-LLMSTXT-SECTIONS-END
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_bases: true
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source
            docstring_style: google
            merge_init_into_class: true
            show_if_no_docstring: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: false
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  # PROJECT-NAV-START — replace with your real navigation; kept across copier
  # update. Keep aligned with the `llmstxt` plugin's sentinel-protected
  # `sections:` block above.
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Configuration: configuration.md
  - Guides:
      - Overview: guides/index.md
      - Git Integration: guides/git-integration.md
      - Claude Desktop: guides/claude-desktop.md
      - Docker: guides/docker.md
      - Embeddings: guides/embeddings.md
      - Authentication: guides/authentication.md
      - OIDC Providers: guides/oidc-providers.md
      - Obsidian Everywhere: guides/obsidian-everywhere.md
      - Research Workflows: guides/research-workflows.md
      - Zettelkasten: guides/zettelkasten.md
      - PARA: guides/para.md
      - MCP Apps: guides/mcp-apps.md
      - Claude Code Plugin: guides/claude-code-plugin.md
      - File Exchange: guides/file-exchange.md
  - MCP Interface:
      - Tools: tools/index.md
      - Resources: resources.md
      - Prompts: prompts.md
  - Deployment:
      - Overview: deployment/index.md
      - Docker: deployment/docker.md
      - systemd: deployment/systemd.md
      - Claude Desktop: deployment/claude-desktop.md
      - OIDC Authentication: deployment/oidc.md
  - Python API:
      - Collection: api/collection.md
      - Git Integration: api/git.md
      - Configuration: api/config.md
      - Embedding Providers: api/providers.md
      - Types: api/types.md
      - Exceptions: api/exceptions.md
  # PROJECT-NAV-END
